<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pallindrome Checker</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="tag1">
    <div class="tag2">
        <div class="tag3">
            <p>Pallindrome Checker</p>
        </div>
        <div class="tag4">
            <input type="text" id="numbers" placeholder="Enter the values">
        </div>
        <div class="tag5">
            <button type="button" onclick="method()">Click</button>
        </div>
        <div id="results">

        </div>
    </div>
    <script>
        function method(){
         let text = document.getElementById("numbers").value;

    let original = text;
    let reverse = "";

    for(let i = text.length - 1; i >= 0; i--){
        reverse += text[i];
    }

    let results = document.getElementById("results");

    if(original == reverse){
        results.innerHTML = "Palindrome";
    }
    else{
        results.innerHTML = "Not Palindrome";
    }
    }
    </script>
</body>
</html>
